<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prasath Movies</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
  background:radial-gradient(circle at top,#071821,#000);
  min-height:100vh;
  color:#fff;
  overflow:hidden;
}

/* LOGO */
.logo{
  position:fixed;
  top:60px;
  left:60px;
  width:90px;
  height:90px;
  border-radius:50%;
  overflow:hidden;
  box-shadow:0 0 35px cyan;
  z-index:2000;
}
.logo img{width:100%;height:100%;object-fit:cover}

/* SEARCH BAR */
.search-bar{
  position:fixed;
  top:35px;
  left:50%;
  transform:translateX(-50%);
  z-index:2000;
}
.search-bar input{
  padding:14px 26px;
  border:none;
  outline:none;
  border-radius:999px;
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(20px);
  color:#fff;
  font-size:16px;
  box-shadow:0 0 30px cyan;
}

/* SCREENS */
.screen{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition:.6s ease;
}
.hidden{opacity:0;pointer-events:none;transform:scale(1.05)}

/* WELCOME */
.welcome{
  font-size:50px;
  font-weight:900;
  margin-bottom:40px;
  background:linear-gradient(120deg,#00ffff,#ff00ff,#00ffff);
  background-size:300% 300%;
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  animation:liquidText 6s ease-in-out infinite;
  filter:drop-shadow(0 0 22px cyan);
}
@keyframes liquidText{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* GRID */
.grid{
  width:90%;
  max-width:820px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:28px;
}

/* LIQUID BUTTON */
.liquid-btn{
  height:190px;
  border-radius:36px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  font-weight:900;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}
.liquid-btn::before{
  content:"";
  position:absolute;
  width:220%;
  height:220%;
  background:
    radial-gradient(circle at 25% 25%,#00ffff,transparent 45%),
    radial-gradient(circle at 75% 75%,#ff00ff,transparent 45%),
    linear-gradient(135deg,#00ffff,#ff00ff);
  filter:blur(30px);
  animation:flow 10s linear infinite;
  z-index:-2;
}
.liquid-btn::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(255,255,255,.14);
  backdrop-filter:blur(25px);
  z-index:-1;
}
@keyframes flow{
  0%{transform:translate(-30%,-30%) rotate(0)}
  100%{transform:translate(-30%,-30%) rotate(360deg)}
}
.liquid-btn:hover{transform:scale(1.07);box-shadow:0 0 65px cyan}

/* CATEGORY HEADER (Back + Title together) */
.category-header{
  width:90%;
  max-width:720px;
  display:flex;
  align-items:center;
  gap:16px;
  margin-top:90px;
}
.back-btn{
  padding:10px 18px;
  border-radius:999px;
  background:linear-gradient(135deg,#00ffff,#ff00ff);
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 0 25px cyan;
}
.category-title{
  font-size:36px;
  font-weight:900;
  background:linear-gradient(135deg,#00ffff,#ff00ff);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

/* MOVIES */
.movies{
  margin-top:30px;
  width:90%;
  max-width:720px;
  max-height:55vh;
  overflow-y:auto;
}
.movie{
  margin-top:16px;
  padding:20px;
  border-radius:26px;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(16px);
}
.play{
  margin-top:12px;
  padding:14px;
  border-radius:999px;
  background:linear-gradient(135deg,#ff00ff,#00ffff);
  text-align:center;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:600px){
  .grid{grid-template-columns:1fr}
  .welcome{font-size:36px}
  .logo{width:70px;height:70px;top:30px;left:20px}
}
</style>
</head>

<body>

<div class="logo">
  <img src="https://i.pinimg.com/736x/e1/21/52/e12152362b80e2e1d7beb8d9314fdee3.jpg">
</div>

<div class="search-bar">
  <input id="search" placeholder="Search movies">
</div>

<!-- HOME -->
<div id="home" class="screen">
  <div class="welcome">Welcome To Prasath Movies</div>
  <div class="grid">
    <div class="liquid-btn" onclick="openCategory('Hollywood')">Hollywood Collection</div>
    <div class="liquid-btn" onclick="openCategory('Bollywood')">Bollywood Collection</div>
    <div class="liquid-btn" onclick="openCategory('Series')">Series & Drama</div>
    <div class="liquid-btn" onclick="openCategory('Cartoon')">Cartoon</div>
  </div>

  <!-- home search result -->
  <div id="homeMovies" class="movies"></div>
</div>

<!-- CATEGORY -->
<div id="category" class="screen hidden">
  <div class="category-header">
    <div class="back-btn" onclick="goBack()">← Back</div>
    <div id="catTitle" class="category-title"></div>
  </div>
  <div id="movies" class="movies"></div>
</div>

<script>
const moviesData=[
 
 {name:"Hotel Transylvania (2012)",cat:"Cartoon",link:"https://drive.google.com/file/d/1kb1mm3rsctloklpf5GkgovsdEPdpWShk/view"},
 {name:"7 (Seven)",cat:"Bollywood",link:"https://drive.google.com/file/d/1SILyLCag-1KnptVSsK4y6d1QI-YgbQK7/view"},
 {name:"Alien Outbreak (2020 Tamil)",cat:"Hollywood",link:"https://drive.google.com/file/d/1ld8-NGqw4yiU7bMKEkljT_vINJfVTH_A/view"},
 {name:"Rogue (2020 Tamil)",cat:"Hollywood",link:"https://drive.google.com/file/d/1m29Gut1BY3ERHYg2Q1zgqvQcJKTMPcqK/view"},
 {name:"Sabdham (2025)",cat:"Series",link:"https://drive.google.com/file/d/110mXeF0qwqpe307FxzhpZHW1eL_UYpNO/view"},
 {name:"Anaconda-1 (Tamil)",cat:"Hollywood",link:"https://drive.google.com/file/d/133w7XEEb05R68jiEc-ocPycFpDresMiT/view"},
 {name:"Anaconda-2 (Tamil)",cat:"Hollywood",link:"https://drive.google.com/file/d/1mIVspZ-JHys1nemhUnG1eipLbjzJXKYV/view"},
 {name:"Anaconda-3 (Tamil)",cat:"Hollywood",link:"https://drive.google.com/file/d/1vd2zVmRdfii6bPiuRKDH-wwdYrkLEbF-/view"}

];

let currentCat="";

/* Home page search */
search.addEventListener("input",()=>{
  const q=search.value.toLowerCase();
  homeMovies.innerHTML="";
  if(!q) return;
  moviesData.filter(m=>m.name.toLowerCase().includes(q)).forEach(m=>{
    homeMovies.innerHTML+=`
      <div class="movie">
        <div>${m.name}</div>
        <div class="play" onclick="window.open('${m.link}','_blank')">▶ WATCH</div>
      </div>`;
  });
});

/* Category open */
function openCategory(cat){
  currentCat=cat;
  home.classList.add("hidden");
  category.classList.remove("hidden");
  catTitle.textContent=cat+" Collection";
  movies.innerHTML="";
  moviesData.filter(m=>m.cat===cat).forEach(m=>{
    movies.innerHTML+=`
      <div class="movie">
        <div>${m.name}</div>
        <div class="play" onclick="window.open('${m.link}','_blank')">▶ WATCH</div>
      </div>`;
  });
}

function goBack(){
  category.classList.add("hidden");
  home.classList.remove("hidden");
}
</script>

</body>
</html>
