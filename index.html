<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prasath's Movie Show</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{
  background:radial-gradient(circle at top,#0f2027,#000);
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:190px;
}

/* ===== TOP UI (HIDE ON SCROLL) ===== */
.top-ui{
  position:fixed;
  top:0; width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  padding-top:15px;
  transition:transform .45s ease, opacity .45s ease;
  z-index:1000;
}
.top-ui.hide{ transform:translateY(-160%); opacity:0; }

/* ===== TOP BAR ===== */
.top-bar{ display:flex; align-items:center; gap:12px; }

/* ===== PROFILE LOGO ===== */
.profile{
  width:70px; height:70px;
  border-radius:50%;
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(16px);
  box-shadow:0 0 30px cyan, inset 0 0 15px #fff4;
  overflow:hidden;
}
.profile img{ width:100%; height:100%; object-fit:cover; }

/* ===== SEARCH BOX ===== */
.search-box input{
  width:180px;
  padding:14px 22px;
  border:none; outline:none;
  border-radius:999px;
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(20px);
  color:#fff; font-size:17px;
  text-align:center;
  box-shadow:0 0 25px rgba(0,255,255,.45), inset 0 0 12px rgba(255,255,255,.25);
  transition:.4s;
}
.search-box input:focus{ width:240px; box-shadow:0 0 40px cyan; }

/* ===== ADMIN BUTTON ===== */
.admin-btn{
  padding:14px 18px;
  border-radius:999px;
  background:linear-gradient(135deg,#ff00ff,#00ffff);
  font-weight:bold; cursor:pointer;
  box-shadow:0 0 20px magenta;
}

/* ===== WELCOME TITLE ===== */
.welcome{
  text-align:center;
  padding:18px 28px;
  font-size:34px; font-weight:900;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(16px);
  border-radius:30px;
  box-shadow:0 0 30px rgba(0,255,255,.4), inset 0 0 15px rgba(255,255,255,.2);
  color:#fff; text-shadow:0 0 14px rgba(0,255,255,.6);
}

/* ===== CARD ===== */
.card{
  width:96%; max-width:520px;
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(20px);
  border-radius:30px;
  padding:30px; margin-bottom:25px;
  box-shadow:0 0 60px rgba(0,255,255,.25);
}
h2{text-align:center;margin-bottom:15px;font-size:28px}

/* ===== MOVIE CARD ===== */
.movie{
  background:rgba(0,0,0,.5);
  padding:20px; border-radius:28px; margin-top:16px;
}
.movie-name{ font-size:22px; font-weight:bold; }
.play-btn{
  margin-top:14px; padding:20px;
  border-radius:999px;
  background:linear-gradient(135deg,#ff00ff,#00ffff);
  text-align:center; font-size:20px; font-weight:bold;
  cursor:pointer; transition:.35s;
}
.play-btn:hover{ transform:scale(1.12); box-shadow:0 0 40px magenta; }
</style>
</head>

<body>

<!-- ===== TOP UI ===== -->
<div class="top-ui" id="topUI">
  <div class="top-bar">
    <div class="profile">
      <img src="https://png.pngtree.com/background/20230526/original/pngtree-an-anime-person-with-white-hair-looking-to-his-side-with-picture-image_2742380.jpg" alt="Logo">
    </div>

    <div class="search-box">
      <input id="search" placeholder="Search Movie..." oninput="filterMovies()">
    </div>

    <div class="admin-btn">ADMIN</div>
  </div>

  <div class="welcome">Welcome to Prasath's Movie Show</div>
</div>

<!-- Movies -->
<div class="card">
  <h2>Movies</h2>
  <div id="movies"></div>
</div>

<script>
const moviesData=[
 {name:"Hotel Transylvania (2012)",link:"https://drive.google.com/file/d/1kb1mm3rsctloklpf5GkgovsdEPdpWShk/view?usp=drivesdk"},
 {name:"7(Seven)",link:"https://drive.google.com/file/d/1SILyLCag-1KnptVSsK4y6d1QI-YgbQK7/view?usp=drivesdk"},
 {name:"Alien Outbreak (2020 Tamil)",link:"https://drive.google.com/file/d/1ld8-NGqw4yiU7bMKEkljT_vINJfVTH_A/view?usp=drivesdk"},
 {name:"Sabdham (2025)",link:"https://drive.google.com/file/d/110mXeF0qwqpe307FxzhpZHW1eL_UYpNO/view?usp=drivesdk"},
 {name:"Anaconda-1 (Tamil)",link:"https://drive.google.com/file/d/133w7XEEb05R68jiEc-ocPycFpDresMiT/view?usp=drivesdk"},
 {name:"Anaconda-2 (Tamil)",link:"https://drive.google.com/file/d/1mIVspZ-JHys1nemhUnG1eipLbjzJXKYV/view?usp=drivesdk"},
 {name:"Anaconda-3 (Tamil)",link:"https://drive.google.com/file/d/1vd2zVmRdfii6bPiuRKDH-wwdYrkLEbF-/view?usp=drivesdk"},
 {name:"Rogue (2020 Tamil)",link:"https://drive.google.com/file/d/1m29Gut1BY3ERHYg2Q1zgqvQcJKTMPcqK/view?usp=drivesdk"}
];

function render(list){
  movies.innerHTML="";
  list.forEach(m=>{
    movies.innerHTML+=`
      <div class="movie">
        <div class="movie-name">${m.name}</div>
        <div class="play-btn" onclick="window.open('${m.link}','_blank')">▶ WATCH NOW</div>
      </div>`;
  });
}
function filterMovies(){
  const q=search.value.toLowerCase();
  render(moviesData.filter(m=>m.name.toLowerCase().includes(q)));
}

/* Hide top UI on scroll */
let lastScroll=0;
window.addEventListener("scroll",()=>{
  const cur=window.scrollY;
  if(cur>lastScroll && cur>80) topUI.classList.add("hide");
  else topUI.classList.remove("hide");
  lastScroll=cur;
});

render(moviesData);
</script>

</body>
</html>
