<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prasath Movie Show</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{
  background:radial-gradient(circle at top,#0f2027,#000);
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:160px;
}

/* ===== WELCOME TITLE ===== */
.welcome{
  position:fixed;
  top:80px;
  text-align:center;
  padding:18px 28px;
  font-size:34px;
  font-weight:900;
  letter-spacing:1px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(16px);
  border-radius:30px;
  box-shadow:
    0 0 30px rgba(0,255,255,.4),
    inset 0 0 15px rgba(255,255,255,.2);
  color:#ffffff;
  text-shadow:0 0 14px rgba(0,255,255,.6);
  z-index:998;
}

/* ===== SEARCH BOX (TOP CENTER) ===== */
.search-box{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  z-index:999;
}
.search-box input{
  width:220px;
  padding:15px 24px;
  border:none;
  outline:none;
  border-radius:999px;
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(20px);
  color:#fff;
  font-size:18px;
  text-align:center;
  box-shadow:
    0 0 25px rgba(0,255,255,.45),
    inset 0 0 12px rgba(255,255,255,.25);
  transition:.4s;
}
.search-box input::placeholder{color:#ddd}
.search-box input:focus{
  width:280px;
  box-shadow:0 0 40px cyan;
}

/* ===== CARD ===== */
.card{
  width:96%;
  max-width:520px;
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(20px);
  border-radius:30px;
  padding:30px;
  margin-bottom:25px;
  box-shadow:0 0 60px rgba(0,255,255,.25);
}

h2{text-align:center;margin-bottom:15px;font-size:28px}

/* ===== MOVIE CARD ===== */
.movie{
  background:rgba(0,0,0,.5);
  padding:20px;
  border-radius:28px;
  margin-top:16px;
}
.movie-name{
  font-size:22px;
  font-weight:bold;
}
.play-btn{
  margin-top:14px;
  padding:20px;
  border-radius:999px;
  background:linear-gradient(135deg,#ff00ff,#00ffff);
  text-align:center;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  transition:.35s;
}
.play-btn:hover{
  transform:scale(1.12);
  box-shadow:0 0 40px magenta;
}
</style>
</head>

<body>

<!-- Search Box -->
<div class="search-box">
  <input type="text" id="search" placeholder="Search Movie..." oninput="filterMovies()">
</div>

<!-- Welcome Title -->
<div class="welcome">
  Welcome to Prasath Movie Show
</div>

<!-- Movies -->
<div class="card">
  <h2>Movies</h2>
  <div id="movies"></div>
</div>

<script>
/* HARD-CODED MOVIES */
const moviesData = [
  {
    name: "Hotel Transylvania (2012)",
    link: "https://drive.google.com/file/d/1kb1mm3rsctloklpf5GkgovsdEPdpWShk/view?usp=drivesdk"
  },
  {
    name: "7(Seven)",
    link: "https://drive.google.com/file/d/1SILyLCag-1KnptVSsK4y6d1QI-YgbQK7/view?usp=drivesdk"
  },
  {
    name: "Alien Outbreak (2020 Tamil)",
    link: "https://drive.google.com/file/d/1ld8-NGqw4yiU7bMKEkljT_vINJfVTH_A/view?usp=drivesdk"
  },
  {
    name: "Sabdham(2025)",
    link: "https://drive.google.com/file/d/110mXeF0qwqpe307FxzhpZHW1eL_UYpNO/view?usp=drivesdk"
  },
  {
    name: "Anaconda-1(tamil)",
    link: "https://drive.google.com/file/d/133w7XEEb05R68jiEc-ocPycFpDresMiT/view?usp=drivesdk"
  },
  {
    name: "Anaconda-2(tamil)",
    link: "https://drive.google.com/file/d/1mIVspZ-JHys1nemhUnG1eipLbjzJXKYV/view?usp=drivesdk"
  }
];

/* Render Movies */
function render(list){
  movies.innerHTML="";
  list.forEach(m=>{
    let div=document.createElement("div");
    div.className="movie";
    div.innerHTML=`
      <div class="movie-name">${m.name}</div>
      <div class="play-btn" onclick="window.open('${m.link}','_blank')">
        ▶ WATCH NOW
      </div>
    `;
    movies.appendChild(div);
  });
}

/* SEARCH – ALL LETTERS */
function filterMovies(){
  let q = search.value.toLowerCase();
  let filtered = moviesData.filter(m =>
    m.name.toLowerCase().includes(q)
  );
  render(filtered);
}

/* Initial Load */
render(moviesData);
</script>

</body>
</html>
