<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification"
      content="bTZBs_6EcoeX_jyFRGzBp_wBy1FdrGPf1v5Xqktv_FQ">

<title>Flimx Prasath Movies</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
html,body{height:100%;background:#000;color:#fff;overflow-x:hidden}

/* 🌈 LIQUID BACKGROUND */
.liquid-bg{
  position:fixed;inset:0;z-index:-3;
  background:
    radial-gradient(circle at 10% 20%, rgba(0,255,255,.25), transparent 35%),
    radial-gradient(circle at 80% 15%, rgba(255,0,255,.25), transparent 35%),
    radial-gradient(circle at 30% 70%, rgba(0,170,255,.25), transparent 40%),
    radial-gradient(circle at 70% 80%, rgba(255,100,200,.25), transparent 40%),
    linear-gradient(180deg,#050c14,#000);
  filter:blur(50px);
  animation: liquidFloat 22s ease-in-out infinite alternate;
}
@keyframes liquidFloat{to{transform:scale(1.1)}}
.overlay{position:fixed;inset:0;z-index:-2;background:rgba(0,0,0,.25)}

/* SCREENS */
.screen{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:40px 0
}
.hidden{display:none}

/* LOGO */
.logo{
  width:110px;height:110px;
  border-radius:50%;
  position:relative;
  overflow:hidden;
  margin-bottom:18px
}
.logo img{
  width:100%;height:100%;
  border-radius:50%;
  z-index:2;position:relative
}
.logo::before{
  content:"";
  position:absolute;inset:-30%;
  background:
    radial-gradient(circle,rgba(0,255,255,.8),transparent 60%),
    radial-gradient(circle,rgba(255,0,255,.8),transparent 60%);
  filter:blur(25px);
  animation:spin 6s linear infinite;
  z-index:1
}
@keyframes spin{to{transform:rotate(360deg)}}

/* GLASS CARD */
.glass{
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(24px);
  border-radius:28px;
  box-shadow:
    0 0 40px rgba(0,255,255,.25),
    0 0 80px rgba(255,0,255,.15)
}

/* WELCOME */
.welcome{
  font-size:32px;
  font-weight:900;
  text-align:center;
  background:linear-gradient(120deg,#00ffff,#ff00ff,#00ffff);
  background-size:300% 300%;
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  animation:textFlow 6s ease infinite
}
@keyframes textFlow{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* 🔍 SEARCH + RECENT (✅ SAME WIDTH AS WELCOME) */
.search-row{
  width:90%;
  max-width:720px;        /* ✅ same as welcome */
  display:flex;
  gap:14px;
  margin:20px 0
}
.search-row input{
  flex:1;
  padding:14px 18px;
  border:none;
  outline:none;
  border-radius:999px;
  background:rgba(255,255,255,.14);
  backdrop-filter:blur(18px);
  color:#fff;
  box-shadow:
    0 0 25px rgba(0,255,255,.35),
    0 0 45px rgba(255,0,255,.25);
  text-align:center
}
.pill{
  width:160px;            /* ✅ fixed Recent */
  padding:14px 0;
  border-radius:999px;
  background:rgba(255,255,255,.14);
  backdrop-filter:blur(18px);
  color:#fff;
  box-shadow:
    0 0 25px rgba(0,255,255,.35),
    0 0 45px rgba(255,0,255,.25);
  text-align:center;
  font-weight:bold;
  cursor:pointer
}

/* CATEGORY GRID */
.grid{
  width:90%;
  max-width:750px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  margin-bottom:20px
}

/* CATEGORY BUTTON */
.liquid-btn{
  height:130px;
  border-radius:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:900;
  cursor:pointer;
  position:relative;
  overflow:hidden
}
.liquid-btn::before{
  content:"";
  position:absolute;
  width:260%;height:260%;
  background:
    radial-gradient(circle at 30% 30%,#00ffff,transparent 60%),
    radial-gradient(circle at 70% 70%,#ff00ff,transparent 60%);
  filter:blur(30px);
  animation:spin 7s linear infinite
}
.liquid-btn span{position:relative;z-index:1}

/* MOVIES */
.movies{width:90%;max-width:700px}
.movie{
  margin-top:14px;
  padding:16px;
  border-radius:20px;
  background:rgba(255,255,255,.14);
  backdrop-filter:blur(18px)
}
.play{
  margin-top:10px;
  padding:12px;
  border-radius:999px;
  background:linear-gradient(135deg,#ff00ff,#00ffff);
  text-align:center;
  cursor:pointer
}

/* BACK / EXIT */
.back-btn{
  margin-bottom:16px;
  padding:10px 22px;
  border-radius:999px;
  background:linear-gradient(135deg,#00ffff,#ff00ff);
  cursor:pointer
}
</style>
</head>

<body style = background-color:#171e23>
<div class="liquid-bg"></div>
<div class="overlay"></div>

<!-- HOME -->
<div id="home" class="screen">
  <div class="logo">
    <img src="https://img.freepik.com/premium-photo/hooded-hacker-logo-mascot_941097-25265.jpg">
  </div>

  <div class="glass" style="padding:28px;width:90%;max-width:720px;">
    <div class="welcome">Welcome To FlimX Movies World!</div>
  </div>

  <div class="search-row">
    <input id="search" placeholder="Search movies">
    <div class="pill" onclick="openRecent()">Recent</div>
  </div>

  <div id="categoryGrid" class="grid">
    <div class="liquid-btn" onclick="openCategory('Hollywood')"><span>Hollywood</span></div>
    <div class="liquid-btn" onclick="openCategory('Bollywood')"><span>Bollywood</span></div>
    <div class="liquid-btn" onclick="openCategory('Series')"><span>Series</span></div>
    <div class="liquid-btn" onclick="openCategory('Cartoon')"><span>Cartoon</span></div>
    <div class="liquid-btn" onclick="openCategory('K/C Drama')"><span>K/C Drama</span></div>
  </div>

  <div id="homeMovies" class="movies"></div>
</div>

<!-- CATEGORY -->
<div id="category" class="screen hidden">
  <div class="back-btn" onclick="goHome()">← Home</div>
  <div id="moviesBox" class="movies"></div>
</div>

<!-- ✅ K/C DRAMA SUB -->
<div id="kcDrama" class="screen hidden">
  <div class="back-btn" onclick="goHome()">← Home</div>
  <div id="subBox" class="grid"></div>
</div>


<!-- RECENT -->
<div id="recent" class="screen hidden">
  <div class="back-btn" onclick="goHome()">✕ Exit</div>
  <div id="recentMovies" class="movies"></div>
</div>

<script>
const moviesData=[
 {name:"Hotel Transylvania (2012)",cat:"Cartoon",link:"https://drive.google.com/file/d/1kb1mm3rsctloklpf5GkgovsdEPdpWShk/view"},
 {name:"7 (Seven)",cat:"Bollywood",link:"https://drive.google.com/file/d/1SILyLCag-1KnptVSsK4y6d1QI-YgbQK7/view"},
 {name:"Alien Outbreak (2020 Tamil)",cat:"Hollywood",link:"https://drive.google.com/file/d/1ld8-NGqw4yiU7bMKEkljT_vINJfVTH_A/view"},
 {name:"Rogue (2020 Tamil)",cat:"Hollywood",link:"https://drive.google.com/file/d/1m29Gut1BY3ERHYg2Q1zgqvQcJKTMPcqK/view"},
 {name:"Sabdham (2025)",cat:"Bollywood",link:"https://drive.google.com/file/d/110mXeF0qwqpe307FxzhpZHW1eL_UYpNO/view"},
 {name:"Anaconda-1",cat:"Hollywood",link:"https://drive.google.com/file/d/133w7XEEb05R68jiEc-ocPycFpDresMiT/view"},
 {name:"Anaconda-2",cat:"Hollywood",link:"https://drive.google.com/file/d/1mIVspZ-JHys1nemhUnG1eipLbjzJXKYV/view"},
 {name:"Anaconda-3",cat:"Hollywood",link:"https://drive.google.com/file/d/1vd2zVmRdfii6bPiuRKDH-wwdYrkLEbF-/view"},
 {name:"Youth(2026)",cat:"Bollywood",link:"https://drive.google.com/file/d/1l9_Vbb1tbYP72itQa-gkfq9cRses8Drm/view"},
 {name:"Couple_Friendly 2026_",cat:"Bollywood",link:"https://drive.google.com/file/d/1Chs5v07V0-m1RevBDbtoE16c_mk670yA/view"},
 {name:"Dhurandhar-1",cat:"Bollywood",link:"https://drive.google.com/file/d/1hLYycPuG6ztK8LBRoPcURUfyIGUqWYAa/view"},
 {name:"MAD (2023)",cat:"Bollywood",link:"https://drive.google.com/file/d/1eeWqSHaNri3ZZ8fHU3Vw4Mlo4owt3MyP/view"},
 {name:"Archind",cat:"Hollywood",link:"https://drive.google.com/file/d/1fkOvzSL1RIImq0cuiH75ymjb_VKvkS-X/view"},
 {name:"Even if Love Disappears Tonight(2026) ",cat:"K/C Drama",sub:"K/C Movies",link:"https://drive.google.com/file/d/1b42limOHw7CMi35PSnXisi6qUi5vLWk3/view"},
 {name:"Fantacy island(2020)",cat:"Hollywood",link:"https://drive.google.com/file/d/1aarCp7sjEYU_fgs45smQCevcQXJHle97/view"},
 {name:"Lokah chapter-11 Chandra(2025)",cat:"Bollywood",link:"https://drive.google.com/file/d/1fTD_1xSTtHFAlpLdr37UuH9Nk0XpRWT-/view"},
 {name:"Dhurandhar-2 (2025)",cat:"Bollywood",link:"https://drive.google.com/file/d/1NbgnPBJIM1QO2kTKBKzoGtn8V63Bu3sy/view"},
 {name:"The Larva island movie(2020)",cat:"Cartoon",link:"https://drive.google.com/file/d/1Ql5Uv8YUkpjrXxPZ02nDT_7Wot0mozEL/view"},
 {name:"Ben 10 Alien Swarm(2009)",cat:"Hollywood",link:"https://drive.google.com/file/d/1C_ISqMTYFrLSKZLG7C0MtkqGMDtQ1dN8/view"},
 {name:"With Love(2026)",cat:"Bollywood",link:"https://drive.google.com/file/d/1vX5ids9o_wG4ScEMWhK6srzxY4GVjlEu/view"},
 {name:"Kalki(2024)",cat:"Bollywood",link:"https://drive.google.com/file/d/1BfMa_Gk9LQJOMb8i2WJzpXy1-QxeBRqy/view"},
 {name:"Sambavam Adhyayam Onnu(2026)",cat:"Bollywood",link:"https://drive.google.com/file/d/1K87svNDq-pXy7JL9pUPLpEpAC9sVe-0z/view"},
 {name:"Dune Part Two(2024)",cat:"Hollywood",link:"https://drive.google.com/file/d/10A7084Hvc1yzRp15C3964xMu9kCeeFPM/view"},
 {name:"Saamy(2003)",cat:"Bollywood",link:"https://drive.google.com/file/d/16STcA1rD5f2l-N4vYKe0nl5BgiGV6KY0/view"},
 {name:"Must date the play boy(1-8) S-1 ",cat:"Series",sub:"Must date the playboy",link:"https://drive.google.com/file/d/1bg2nPq-ny_WO70PM0Iyq33V3XmhpyyKH/view"},
 {name:"Complete Conquest of Love(2020)",cat:"K/C Drama",sub:"K/C Movies",link:"https://drive.google.com/file/d/1FiT_P27Z4b_7ZHoN27YpihWKfMf139fC/view?usp=drivesdk"},
 {name:"Must date the play boy(9-16) S-1 ",cat:"Series",sub:"Must date the playboy",link:"https://drive.google.com/file/d/1OTx8Zuu3vwwDRHweiBklbAkcDgWkq2F6/view?usp=drivesdk"}




];

/* render */
function render(list, box){
  box.innerHTML="";
  list.forEach(m=>{
    box.innerHTML+=`
    <div class="movie">
      <div>${m.name}</div>
      <div class="play" onclick="window.open('${m.link}','_blank')">▶ WATCH</div>
    </div>`;
  });
}

/* SEARCH */
search.addEventListener("input",()=>{
  const q=search.value.toLowerCase();
  homeMovies.innerHTML="";
  if(!q){
    categoryGrid.style.display="grid";
    return;
  }
  categoryGrid.style.display="none";
  render(moviesData.filter(m=>m.name.toLowerCase().includes(q)),homeMovies);
});

/* ✅ FIXED CATEGORY */
function openCategory(cat){

  if(cat==="K/C Drama" || cat==="Series"){

    home.classList.add("hidden");
    kcDrama.classList.remove("hidden");

    let data=moviesData.filter(m=>m.cat.toLowerCase()===cat.toLowerCase());
    let subs=[...new Set(data.map(m=>m.sub).filter(Boolean))];

    subBox.innerHTML="";

    subs.forEach(s=>{
      subBox.innerHTML+=`
        <div class="liquid-btn" onclick="openSub('${cat}','${s}')">
          <span>${s}</span>
        </div>`;
    });

    return;
  }

  home.classList.add("hidden");
  category.classList.remove("hidden");

  render(moviesData.filter(m=>m.cat===cat),moviesBox);
}

/* ✅ SUB */
function openSub(cat,sub){

  kcDrama.classList.add("hidden");
  category.classList.remove("hidden");

  render(
    moviesData.filter(m=>m.cat.toLowerCase()===cat.toLowerCase() && m.sub===sub),
    moviesBox
  );
}

/* RECENT */
function openRecent(){
  home.classList.add("hidden");
  recent.classList.remove("hidden");
  render([...moviesData].reverse(),recentMovies);
}

/* HOME */
function goHome(){
  category.classList.add("hidden");
  recent.classList.add("hidden");
  kcDrama.classList.add("hidden");
  home.classList.remove("hidden");

  homeMovies.innerHTML="";
  categoryGrid.style.display="grid";
  search.value="";
}
</script>

</body>
</html>
