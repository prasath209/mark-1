<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prasath Movie Show</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{
  background:radial-gradient(circle at top,#0f2027,#000);
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:160px;
}

/* ===== WELCOME TITLE ===== */
.welcome{
  position:fixed;
  top:60px;
  text-align:center;
  padding:18px 28px;
  font-size:34px;
  font-weight:900;
  letter-spacing:1px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(14px);
  border-radius:30px;
  box-shadow:
    0 0 25px rgba(0,255,255,.35),
    inset 0 0 15px rgba(255,255,255,.2);
  color:#ffffff;
  text-shadow:0 0 12px rgba(0,255,255,.6);
  z-index:998;
}

/* ===== WATCHING EYE ===== */
.eye-box{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  z-index:999;
}
.eye{
  width:120px;height:60px;
  background:#fff;
  border-radius:0 0 80px 80px;
  position:relative;
}
.pupil{
  width:26px;height:26px;
  background:#000;
  border-radius:50%;
  position:absolute;
  top:18px;left:47px;
  transition:.15s;
}

/* ===== SEARCH BOX ===== */
.search-box{
  position:fixed;
  top:15px;
  right:15px;
  z-index:999;
}
.search-box input{
  width:160px;
  padding:12px 18px;
  border:none;
  outline:none;
  border-radius:999px;
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(15px);
  color:#fff;
  font-size:16px;
  box-shadow:
    0 0 20px rgba(0,255,255,.4),
    inset 0 0 10px rgba(255,255,255,.25);
  transition:.35s;
}
.search-box input::placeholder{color:#ddd}
.search-box input:focus{
  width:230px;
  box-shadow:0 0 30px cyan;
}

/* ===== CARD ===== */
.card{
  width:96%;
  max-width:520px;
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(20px);
  border-radius:30px;
  padding:30px;
  margin-bottom:25px;
  box-shadow:0 0 60px rgba(0,255,255,.25);
}

h2{text-align:center;margin-bottom:15px;font-size:28px}

/* ===== MOVIE CARD ===== */
.movie{
  background:rgba(0,0,0,.5);
  padding:20px;
  border-radius:28px;
  margin-top:16px;
}
.movie-name{
  font-size:22px;
  font-weight:bold;
}
.play-btn{
  margin-top:14px;
  padding:20px;
  border-radius:999px;
  background:linear-gradient(135deg,#ff00ff,#00ffff);
  text-align:center;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  transition:.3s;
}
.play-btn:hover{
  transform:scale(1.12);
  box-shadow:0 0 40px magenta;
}
</style>
</head>

<body>

<!-- Watching Eye -->
<div class="eye-box">
  <div class="eye">
    <div class="pupil" id="pupil"></div>
  </div>
</div>

<!-- Search -->
<div class="search-box">
  <input type="text" id="search" placeholder="Search Movie..." oninput="filterMovies()">
</div>

<!-- Welcome Title -->
<div class="welcome">
  Welcome to Prasath Movie Show
</div>

<!-- Movies -->
<div class="card">
  <h2>Movies</h2>
  <div id="movies"></div>
</div>

<script>
/* HARD-CODED MOVIES */
const moviesData = [
  {
    name: "Hotel Transylvania (2012)",
    link: "https://drive.google.com/file/d/1kb1mm3rsctloklpf5GkgovsdEPdpWShk/view?usp=drivesdk"
  },
  {
    name: "7(Seven)",
    link: "https://drive.google.com/file/d/1SILyLCag-1KnptVSsK4y6d1QI-YgbQK7/view?usp=drivesdk"
  },
  {
    name: "Alien Outbreak (2020 Tamil)",
    link: "https://drive.google.com/file/d/1ld8-NGqw4yiU7bMKEkljT_vINJfVTH_A/view?usp=drivesdk"
  }
];

/* Render Movies */
function render(list){
  movies.innerHTML="";
  list.forEach(m=>{
    let div=document.createElement("div");
    div.className="movie";
    div.innerHTML=`
      <div class="movie-name">${m.name}</div>
      <div class="play-btn" onclick="window.open('${m.link}','_blank')">
        ▶ WATCH NOW
      </div>
    `;
    movies.appendChild(div);
  });
}

/* SEARCH – ALL LETTERS, CASE INSENSITIVE */
function filterMovies(){
  let q = search.value.toLowerCase();
  let filtered = moviesData.filter(m =>
    m.name.toLowerCase().includes(q)
  );
  render(filtered);
}

/* Eye follow mouse */
document.addEventListener("mousemove",e=>{
  let x=(e.clientX/window.innerWidth-.5)*30;
  let y=(e.clientY/window.innerHeight-.5)*14;
  pupil.style.transform=`translate(${x}px,${y}px)`;
});

/* Load initial movies */
render(moviesData);
</script>

</body>
</html>
